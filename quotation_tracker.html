<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eterno Labs — Tracker de cotizaciones</title>
  <link rel="stylesheet" href="./eterno-ui.css">
</head>
<body>
  <div class="app-shell">
    <div id="nav-mount"></div>

    <header class="page-header">
      <div>
        <h1 class="page-title">Cotizaciones por proveedor</h1>
        <p class="page-sub" id="saveStatus">Guardado automático en este navegador</p>
      </div>
      <div class="toolbar">
        <button type="button" class="btn btn-primary" id="btnAdd">+ Cotización</button>
        <button type="button" class="btn" id="btnExportCsv">CSV</button>
      </div>
    </header>

    <div class="metrics" id="metrics"></div>

    <div class="controls-bar">
      <div class="control-group">
        <label>Ingrediente</label>
        <select id="fIngredient"><option value="">Todos</option></select>
      </div>
      <div class="control-group">
        <label>Proveedor</label>
        <select id="fProvider"><option value="">Todos</option></select>
      </div>
      <div class="control-group">
        <label>Estado</label>
        <select id="fEstado">
          <option value="">Todos</option>
          <option value="compatible">Compatible</option>
          <option value="incompatible">Incompatible</option>
          <option value="obsoleto">Obsoleto</option>
          <option value="vencido">Vencido</option>
          <option value="pendiente">Pendiente</option>
        </select>
      </div>
      <div class="control-group" style="flex:1;min-width:180px">
        <label>Buscar</label>
        <input type="text" id="fSearch" placeholder="Ingrediente, proveedor, notas..." style="width:100%">
      </div>
    </div>

    <div class="table-wrap">
      <table class="responsive">
        <thead>
          <tr>
            <th>Ingrediente</th>
            <th>Proveedor</th>
            <th style="text-align:center">Moneda</th>
            <th class="th-num sortable" data-sort="price">USD/kg <span class="sort-arrow">▾</span></th>
            <th class="th-num sortable" data-sort="landed">Landed <span class="sort-arrow">▾</span></th>
            <th class="th-num sortable" data-sort="moq">MOQ</th>
            <th class="th-num sortable" data-sort="leadTimeDays">Lead time</th>
            <th class="sortable" data-sort="validUntil">Vencimiento</th>
            <th style="text-align:center">Spec</th>
            <th style="text-align:center">Estado</th>
            <th style="text-align:center">Acc.</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <p class="note" id="totalNote"></p>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modalTitle">Agregar cotización</h3>
      <div class="field">
        <label>Ingrediente</label>
        <select id="fIng"></select>
      </div>
      <div class="field">
        <label>Proveedor</label>
        <input type="text" id="fProv" list="provList" placeholder="Ej: P1 China, Sumiquim...">
        <datalist id="provList"></datalist>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Precio</label>
          <input type="number" id="fPrice" min="0" step="0.01">
        </div>
        <div class="field">
          <label>Moneda</label>
          <select id="fCurrency">
            <option value="USD">USD</option>
            <option value="COP">COP</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Unidad de presentación</label>
          <select id="fUnit">
            <option value="kg">kg</option>
            <option value="g">g</option>
            <option value="l">l</option>
            <option value="ml">ml</option>
            <option value="unidad">unidad</option>
          </select>
        </div>
        <div class="field">
          <label>Incoterm</label>
          <select id="fIncoterm">
            <option value="EXW">EXW</option>
            <option value="FOB">FOB</option>
            <option value="CIF">CIF</option>
            <option value="DDP">DDP</option>
            <option value="DAP">DAP</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>MOQ (kg)</label>
          <input type="number" id="fMoq" min="0" step="0.1" value="1">
        </div>
        <div class="field">
          <label>Lead time (días)</label>
          <input type="number" id="fLeadTime" min="0" step="1" placeholder="Ej: 15">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Válido hasta</label>
          <input type="date" id="fValidUntil">
        </div>
        <div class="field">
          <label>COA (link)</label>
          <input type="url" id="fCoaUrl" placeholder="https://...">
        </div>
      </div>
      <div class="field">
        <label>COA (nota)</label>
        <input type="text" id="fCoaNota" placeholder="Ej: pureza 98%, lote XYZ">
      </div>
      <div class="field">
        <label>Spec</label>
        <select id="fSpec">
          <option value="pending">Pendiente</option>
          <option value="ok">Confirmada</option>
          <option value="warn">Revisar</option>
          <option value="fail">No cumple</option>
        </select>
      </div>
      <div class="field">
        <label>Estado comercial</label>
        <select id="fStatus">
          <option value="cotizado">Cotizado</option>
          <option value="negociando">Negociando</option>
          <option value="aprobado">Aprobado</option>
          <option value="descartado">Descartado</option>
        </select>
      </div>
      <div class="field">
        <label>Compatibilidad base anhidra</label>
        <select id="fCompat">
          <option value="pending">Pendiente</option>
          <option value="yes">Sí compatible</option>
          <option value="no">No compatible</option>
        </select>
      </div>
      <div class="field">
        <label>Notas</label>
        <input type="text" id="fNotes" placeholder="Contexto, contacto, condiciones...">
      </div>
      <div class="field-error" id="fError" style="display:none"></div>
      <div class="modal-actions">
        <button type="button" class="btn" id="btnCancel">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnSave">Guardar</button>
      </div>
    </div>
  </div>

  <script src="./eterno-store.js"></script>
  <script src="./eterno-nav.js"></script>
  <script>
    let db = EternoStore.loadDb();
    let editId = null;
    let sort = { col: 'price', dir: 'asc' };
    let filters = { ing: '', prov: '', estado: '', search: '' };

    const esc = EternoStore.esc;
    function badge(cls, label) { return `<span class="badge ${cls}">${label}</span>`; }

    const SPEC_BADGE = { ok: ['b-ok', 'OK'], warn: ['b-warn', 'Revisar'], fail: ['b-err', 'No cumple'], pending: ['b-pend', 'Pendiente'] };

    function persist() {
      EternoStore.saveDb(db);
      document.getElementById('saveStatus').textContent = 'Guardado · ' + new Date().toLocaleTimeString('es-CO');
    }

    function populateFilterSelects() {
      const ingSel = document.getElementById('fIngredient');
      ingSel.innerHTML = '<option value="">Todos</option>' + db.formula.map(i => `<option value="${i.id}">${esc(i.name)}</option>`).join('');
      const provSel = document.getElementById('fProvider');
      const provs = [...new Set(db.quotations.map(q => q.provider))].sort();
      provSel.innerHTML = '<option value="">Todos</option>' + provs.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
    }

    function refreshProvList() {
      const names = EternoStore.getSuppliers(db).map(s => s.name).sort();
      document.getElementById('provList').innerHTML = names.map(n => `<option value="${esc(n)}">`).join('');
    }

    // Por diseño esta vista NO oculta incompatibles/unitWarning por defecto (a diferencia
    // de supplier_cost_comparison_dashboard.html y purchase-order.html, que sí filtran):
    // es la vista de auditoría, muestra el universo completo vía quotationStateBadge().
    // El filtro "Estado" (#fEstado, abajo) ya permite al usuario aislar manualmente
    // "Compatible" si quiere ocultar el resto — no agregar un filtro automático aquí.
    function filteredQuotations() {
      return db.quotations.filter(q => {
        if (filters.ing && q.ingId !== filters.ing) return false;
        if (filters.prov && q.provider !== filters.prov) return false;
        if (filters.estado) {
          const b = EternoStore.quotationStateBadge(q);
          const map = { compatible: 'b-compatible', incompatible: 'b-incompatible', obsoleto: 'b-obsoleto', vencido: 'b-vencido', pendiente: 'b-pend' };
          if (b.cls !== map[filters.estado]) return false;
        }
        if (filters.search) {
          const ing = db.formula.find(i => i.id === q.ingId);
          const hay = [ing?.name, ing?.inci, q.provider, q.notes].join(' ').toLowerCase();
          if (!hay.includes(filters.search.toLowerCase())) return false;
        }
        return true;
      });
    }

    function sortRows(rows) {
      const col = sort.col, dir = sort.dir === 'asc' ? 1 : -1;
      return rows.slice().sort((a, b) => {
        let av, bv;
        if (col === 'landed') {
          av = EternoStore.landedPrice(a.price, a.provider, db.settings);
          bv = EternoStore.landedPrice(b.price, b.provider, db.settings);
        } else if (col === 'validUntil') {
          av = a.validUntil ? new Date(a.validUntil).getTime() : Infinity;
          bv = b.validUntil ? new Date(b.validUntil).getTime() : Infinity;
        } else {
          av = a[col]; bv = b[col];
          if (av == null) av = col === 'leadTimeDays' ? Infinity : 0;
          if (bv == null) bv = col === 'leadTimeDays' ? Infinity : 0;
        }
        return (av - bv) * dir;
      });
    }

    function renderMetrics() {
      const all = db.quotations;
      const usable = all.filter(EternoStore.isUsable);
      const expired = all.filter(EternoStore.isExpired).length;
      const missing = EternoStore.getMissingIngredients(db).length;
      document.getElementById('metrics').innerHTML = `
        <div class="metric"><div class="metric-label">Cotizaciones</div><div class="metric-value">${all.length}</div><div class="metric-sub">${usable.length} usables</div></div>
        <div class="metric"><div class="metric-label">Vencidas</div><div class="metric-value">${expired}</div><div class="metric-sub">excluidas del auto-pick</div></div>
        <div class="metric"><div class="metric-label">Ingredientes sin cotización</div><div class="metric-value">${missing}</div><div class="metric-sub">${missing ? 'bloquean el pedido' : 'todos cubiertos'}</div></div>
        <div class="metric"><div class="metric-label">Proveedores</div><div class="metric-value">${EternoStore.getSuppliers(db).length}</div><div class="metric-sub">en el directorio</div></div>
      `;
    }

    function updateSortArrows() {
      document.querySelectorAll('th.sortable').forEach(th => {
        const arrow = th.querySelector('.sort-arrow');
        if (th.dataset.sort === sort.col) { arrow.textContent = sort.dir === 'asc' ? '▲' : '▼'; th.style.color = 'var(--text)'; }
        else { arrow.textContent = '▾'; th.style.color = ''; }
      });
    }

    function renderTable() {
      let rows = filteredQuotations();
      rows = sortRows(rows);
      updateSortArrows();

      if (!rows.length) {
        const presetIng = filters.ing || (db.formula[0] && db.formula[0].id);
        document.getElementById('tbody').innerHTML = `<tr><td colspan="11">
          <div class="empty-state">
            <div class="empty-title">No hay cotizaciones que coincidan</div>
            <div class="empty-sub">Ajusta los filtros o agrega una nueva cotización.</div>
            <button type="button" class="btn btn-primary" id="btnEmptyAdd">Agregar cotización</button>
          </div>
        </td></tr>`;
        document.getElementById('btnEmptyAdd').onclick = () => openModal(presetIng);
        document.getElementById('totalNote').textContent = '';
        return;
      }

      document.getElementById('tbody').innerHTML = rows.map(q => {
        const ing = db.formula.find(i => i.id === q.ingId);
        const st = EternoStore.quotationStateBadge(q);
        const spec = SPEC_BADGE[q.spec] || SPEC_BADGE.pending;
        const landed = EternoStore.landedPrice(q.price, q.provider, db.settings);
        const isPick = db.picks && db.picks[q.ingId] === q.provider;
        const curBadge = q.currencyOriginal === 'COP' ? badge('b-ao', 'COP') : badge('b-carrier', 'USD');
        return `<tr class="${isPick ? 'row-pick' : ''}">
          <td data-label="Ingrediente"><strong>${esc(ing ? ing.name : q.ingId)}</strong><div class="ghost">${esc(ing ? ing.inci : '')}</div></td>
          <td data-label="Proveedor">${esc(q.provider)} ${isPick ? '<span class="badge b-ok" style="margin-left:4px">Pick</span>' : ''}</td>
          <td data-label="Moneda" style="text-align:center">${curBadge}</td>
          <td data-label="USD/kg" class="td-num">$${Number(q.price).toFixed(2)}</td>
          <td data-label="Landed" class="td-num">$${landed.toFixed(2)}</td>
          <td data-label="MOQ" class="td-num">${q.moq} ${esc(q.unit || 'kg')}</td>
          <td data-label="Lead time" class="td-num">${q.leadTimeDays != null ? q.leadTimeDays + 'd' : '—'}</td>
          <td data-label="Vencimiento">${q.validUntil || '—'}</td>
          <td data-label="Spec" style="text-align:center">${badge(spec[0], spec[1])}</td>
          <td data-label="Estado" style="text-align:center">${badge(st.cls, st.label)}</td>
          <td data-label="Acciones" style="text-align:center">
            <button type="button" class="btn btn-sm" data-edit="${q.id}">Editar</button>
            <button type="button" class="btn btn-sm btn-danger" data-del="${q.id}">Eliminar</button>
          </td>
        </tr>`;
      }).join('');

      document.getElementById('totalNote').textContent = `${rows.length} de ${db.quotations.length} cotizaciones mostradas.`;

      document.querySelectorAll('[data-edit]').forEach(el => {
        el.onclick = () => openModal(null, db.quotations.find(q => q.id === el.dataset.edit));
      });
      document.querySelectorAll('[data-del]').forEach(el => {
        el.onclick = async () => {
          const ok = await EternoStore.confirmDialog({
            title: 'Eliminar cotización',
            message: '¿Eliminar esta cotización? Esta acción no se puede deshacer.',
            okLabel: 'Eliminar',
            danger: true,
          });
          if (!ok) return;
          EternoStore.deleteQuotation(db, el.dataset.del);
          db = EternoStore.loadDb();
          renderAll();
          EternoStore.toast('Cotización eliminada');
        };
      });
    }

    function renderAll() {
      renderMetrics();
      renderTable();
    }

    function showError(msg) {
      const el = document.getElementById('fError');
      if (!msg) { el.style.display = 'none'; el.textContent = ''; return; }
      el.style.display = 'block';
      el.textContent = msg;
    }

    function openModal(presetIngId, entry) {
      editId = entry?.id || null;
      refreshProvList();
      showError(null);
      document.getElementById('modalTitle').textContent = editId ? 'Editar cotización' : 'Agregar cotización';
      document.getElementById('fIng').innerHTML = db.formula.map(i =>
        `<option value="${i.id}"${i.id === (entry?.ingId || presetIngId) ? ' selected' : ''}>${esc(i.name)}</option>`
      ).join('');
      document.getElementById('fProv').value = entry?.provider || '';
      document.getElementById('fPrice').value = entry ? (entry.priceOriginal ?? entry.price) : '';
      document.getElementById('fCurrency').value = entry?.currencyOriginal || entry?.currency || 'USD';
      document.getElementById('fUnit').value = entry?.unit || 'kg';
      document.getElementById('fIncoterm').value = entry?.incoterm || 'EXW';
      document.getElementById('fMoq').value = entry?.moq ?? 1;
      document.getElementById('fLeadTime').value = entry?.leadTimeDays ?? '';
      document.getElementById('fValidUntil').value = entry?.validUntil || '';
      document.getElementById('fCoaUrl').value = entry?.coaUrl || '';
      document.getElementById('fCoaNota').value = entry?.coaNota || '';
      document.getElementById('fSpec').value = entry?.spec || 'pending';
      document.getElementById('fStatus').value = entry?.status || 'cotizado';
      document.getElementById('fCompat').value = entry?.compat || 'pending';
      document.getElementById('fNotes').value = entry?.notes || '';
      document.getElementById('modal').classList.add('open');
      if (!entry) setTimeout(() => document.getElementById('fProv').focus(), 50);
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      editId = null;
    }

    document.getElementById('btnAdd').onclick = () => openModal(filters.ing || (db.formula[0] && db.formula[0].id));
    document.getElementById('btnCancel').onclick = closeModal;
    document.getElementById('modal').onclick = (e) => { if (e.target.id === 'modal') closeModal(); };

    document.getElementById('btnSave').onclick = async () => {
      const data = {
        ingId: document.getElementById('fIng').value,
        provider: document.getElementById('fProv').value.trim(),
        price: parseFloat(document.getElementById('fPrice').value),
        currency: document.getElementById('fCurrency').value,
        unit: document.getElementById('fUnit').value,
        incoterm: document.getElementById('fIncoterm').value,
        moq: parseFloat(document.getElementById('fMoq').value) || 1,
        leadTimeDays: document.getElementById('fLeadTime').value === '' ? null : Number(document.getElementById('fLeadTime').value),
        validUntil: document.getElementById('fValidUntil').value || null,
        coaUrl: document.getElementById('fCoaUrl').value.trim() || null,
        coaNota: document.getElementById('fCoaNota').value.trim() || null,
        spec: document.getElementById('fSpec').value,
        status: document.getElementById('fStatus').value,
        compat: document.getElementById('fCompat').value,
        notes: document.getElementById('fNotes').value.trim(),
      };
      if (data.unit !== 'kg') {
        const ok = await EternoStore.confirmDialog({
          title: 'Unidad distinta de kg',
          message: 'El motor de costos solo interpreta USD/kg. Esta cotización quedará EXCLUIDA de comparaciones y auto-selección hasta normalizarse a kg.',
          okLabel: 'Guardar de todas formas',
          cancelLabel: 'Cancelar',
        });
        if (!ok) return;
      }
      const result = editId ? EternoStore.updateQuotation(db, editId, data) : EternoStore.addQuotation(db, data);
      if (!result.ok) { showError(result.error); return; }
      populateFilterSelects();
      persist();
      closeModal();
      renderAll();
      EternoStore.toast(editId ? 'Cotización actualizada' : 'Cotización agregada');
    };

    document.getElementById('fIngredient').onchange = e => { filters.ing = e.target.value; renderTable(); };
    document.getElementById('fProvider').onchange = e => { filters.prov = e.target.value; renderTable(); };
    document.getElementById('fEstado').onchange = e => { filters.estado = e.target.value; renderTable(); };
    document.getElementById('fSearch').oninput = e => { filters.search = e.target.value; renderTable(); };

    document.querySelectorAll('th.sortable').forEach(th => {
      th.onclick = () => {
        const col = th.dataset.sort;
        if (sort.col === col) sort.dir = sort.dir === 'asc' ? 'desc' : 'asc';
        else { sort.col = col; sort.dir = 'asc'; }
        renderTable();
      };
    });

    document.getElementById('btnExportCsv').onclick = () => {
      const headers = ['Ingrediente', 'INCI', 'Proveedor', 'Precio', 'Moneda', 'Unidad', 'MOQ', 'Lead time (d)', 'Vencimiento', 'Spec', 'Compat', 'Estado', 'Notas'];
      const lines = [headers.join(',')];
      filteredQuotations().forEach(q => {
        const ing = db.formula.find(i => i.id === q.ingId);
        lines.push([
          ing?.name || q.ingId, ing?.inci || '', q.provider, q.priceOriginal ?? q.price, q.currencyOriginal || q.currency,
          q.unit || 'kg', q.moq, q.leadTimeDays ?? '', q.validUntil || '', q.spec, q.compat, q.status, q.notes || '',
        ].map(c => `"${String(c).replace(/"/g, '""')}"`).join(','));
      });
      const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'eterno_cotizaciones.csv';
      a.click();
      URL.revokeObjectURL(a.href);
    };

    // Deep-link ?add=ingId
    (function consumeDeepLink() {
      const params = new URLSearchParams(location.search);
      const addId = params.get('add');
      if (addId && db.formula.find(i => i.id === addId)) {
        history.replaceState(null, '', location.pathname);
        setTimeout(() => openModal(addId), 100);
      }
    })();

    populateFilterSelects();
    renderAll();
  </script>
</body>
</html>
